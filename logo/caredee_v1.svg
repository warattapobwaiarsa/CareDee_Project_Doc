<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#45C3E6"/>
      <stop offset="100%" stop-color="#005B9A"/>
    </linearGradient>

    <linearGradient id="goldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD76A"/>
      <stop offset="100%" stop-color="#E0A400"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Circular Wave Shape -->
  <path d="M400 120C280 120 180 220 180 340C180 480 290 590 430 590C500 590 560 560 610 510C570 600 480 670 370 670C210 670 90 540 90 380C90 220 210 90 370 90C500 90 610 170 660 290C620 190 520 120 400 120Z"
        fill="url(#blueGradient)"
        filter="url(#shadow)"/>

  <!-- Tech Orbit Lines -->
  <path d="M310 220C390 180 490 180 570 230" stroke="#BFEFFF" stroke-width="6" stroke-linecap="round"/>
  <path d="M300 270C390 230 490 235 560 290" stroke="#CFF7FF" stroke-width="5" stroke-linecap="round"/>
  <path d="M310 320C390 290 470 300 530 350" stroke="#DDFBFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Orbit Dots -->
  <circle cx="330" cy="215" r="10" fill="#BFEFFF"/>
  <circle cx="520" cy="230" r="10" fill="#FFFFFF"/>
  <circle cx="430" cy="260" r="10" fill="#CFF7FF"/>

  <!-- Star -->
  <path d="M575 250L600 305L660 312L615 350L627 410L575 380L523 410L535 350L490 312L550 305L575 250Z"
        fill="white"
        stroke="url(#goldGradient)"
        stroke-width="12"
        filter="url(#shadow)"/>

  <!-- Letter D -->
  <text x="555" y="360"
        font-family="Arial, sans-serif"
        font-size="70"
        font-weight="bold"
        fill="url(#goldGradient)">D</text>

  <!-- CareDee Text -->
  <text x="180" y="760"
        font-family="Poppins, Arial, sans-serif"
        font-size="110"
        font-weight="700"
        fill="url(#blueGradient)">
    CareDee
  </text>
</svg>
