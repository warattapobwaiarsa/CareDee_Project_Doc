<svg width="1440" height="1350" viewBox="0 0 1440 1350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1440" height="1350" fill="#F8F8F8"/>

  <!-- Sidebar -->
  <rect width="280" height="1350" fill="white" stroke="#B9B9C3" stroke-width="1"/>
  
  <!-- Sidebar Brand -->
  <rect x="118" y="32" width="44" height="44" rx="10" fill="#007A8C"/>
  <text x="140" y="61" fill="white" font-family="Inter, sans-serif" font-size="20" font-weight="700" text-anchor="middle">CD</text>
  <text x="140" y="100" fill="#007A8C" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="700" text-anchor="middle">CareDee Academy</text>
  <text x="140" y="120" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="11" font-weight="400" text-anchor="middle" style="text-transform: uppercase;">Training Institute Interface</text>
  <line x1="0" y1="140" x2="280" y2="140" stroke="#F8F8F8"/>

  <!-- Sidebar Menu -->
  <text x="24" y="190" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">🏠 ภาพรวมสถาบัน</text>
  <text x="24" y="238" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">📥 นำเข้าข้อมูลการอบรม</text>
  <text x="24" y="286" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">🏅 จัดการใบรับรอง</text>

  <!-- Active Item: สถิติตลาดแรงงาน -->
  <rect x="0" y="310" width="280" height="48" fill="#E0F2F4"/>
  <rect x="276" y="310" width="4" height="48" fill="#007A8C"/>
  <text x="24" y="340" fill="#007A8C" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">📈 สถิติตลาดแรงงาน</text>

  <text x="24" y="388" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">🛡️ นโยบายการตรวจสอบ</text>

  <!-- Logout -->
  <line x1="0" y1="1250" x2="280" y2="1250" stroke="#F8F8F8"/>
  <text x="24" y="1290" fill="#EA5455" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">🚪 ออกจากระบบ</text>

  <!-- Main Content Area -->
  <g transform="translate(312, 32)">
    <!-- Header -->
    <rect width="1096" height="88" rx="16" fill="white" shadow="0 4px 12px rgba(0,0,0,0.03)"/>
    <text x="28" y="40" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="700">3. สถิติตลาดแรงงาน (Market Intelligence)</text>
    <text x="28" y="62" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">ข้อมูลเชิงลึกเพื่อการพัฒนาหลักสูตรและการขยายตลาด</text>
    
    <!-- Date Range Button -->
    <rect x="910" y="24" width="160" height="40" rx="8" fill="#E0F2F4"/>
    <text x="990" y="49" fill="#007A8C" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600" text-anchor="middle">📅 ช่วงเวลา: 6 เดือนล่าสุด</text>

    <!-- Stats Grid -->
    <g transform="translate(0, 120)">
      <!-- Card 1 -->
      <rect width="259" height="110" rx="16" fill="white"/>
      <rect width="4" height="110" rx="2" fill="#007A8C"/>
      <text x="24" y="30" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600">ความต้องการแรงงานเฉลี่ย</text>
      <text x="24" y="66" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="24" font-weight="700">4,500 งาน/เดือน</text>
      <text x="24" y="90" fill="#28C76F" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600">↑ 12% จากไตรมาสก่อน</text>

      <!-- Card 2 -->
      <g transform="translate(279, 0)">
        <rect width="259" height="110" rx="16" fill="white"/>
        <rect width="4" height="110" rx="2" fill="#FF9F43"/>
        <text x="24" y="30" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600">ทักษะขาดแคลนอันดับ 1</text>
        <text x="24" y="66" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="24" font-weight="700">ดูแลผู้ป่วยติดเตียง</text>
        <text x="24" y="90" fill="#EA5455" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600">Gap: -250 คน</text>
      </g>

      <!-- Card 3 -->
      <g transform="translate(558, 0)">
        <rect width="259" height="110" rx="16" fill="white"/>
        <rect width="4" height="110" rx="2" fill="#28C76F"/>
        <text x="24" y="30" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600">อัตราการได้งาน (GRADUATES)</text>
        <text x="24" y="66" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="24" font-weight="700">82.5%</text>
        <text x="24" y="90" fill="#28C76F" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600">↑ สูงกว่าค่าเฉลี่ยตลาด 5%</text>
      </g>

      <!-- Card 4 -->
      <g transform="translate(837, 0)">
        <rect width="259" height="110" rx="16" fill="white"/>
        <rect width="4" height="110" rx="2" fill="#00CFE8"/>
        <text x="24" y="30" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600">พื้นที่แนะนำ (SHORTAGE)</text>
        <text x="24" y="66" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="24" font-weight="700">นนทบุรี / บางนา</text>
        <text x="24" y="90" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600">Demand Density: สูงมาก</text>
      </g>
    </g>

    <!-- Main Grid Content -->
    <g transform="translate(0, 262)">
      <!-- Skill Demand Trend Card -->
      <rect width="532" height="520" rx="16" fill="white"/>
      <text x="28" y="44" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="18" font-weight="700">ความต้องการทักษะ (Skill Demand Trend)</text>
      <text x="504" y="44" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" text-anchor="end">วัดจากปริมาณการจองจริง</text>
      <line x1="28" y1="64" x2="504" y2="64" stroke="#F8F8F8"/>

      <!-- Skill 1 -->
      <g transform="translate(28, 90)">
        <text y="0" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="600">ดูแลผู้ป่วยติดเตียง (Bedbound Care)</text>
        <text x="476" y="0" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" text-anchor="end">850 เคส/สัปดาห์ <tspan fill="#28C76F" font-weight="700">↑ 20%</tspan></text>
        <rect y="12" width="476" height="12" rx="6" fill="#F8F8F8"/>
        <rect y="12" width="405" height="12" rx="6" fill="#007A8C"/>
      </g>

      <!-- Skill 2 -->
      <g transform="translate(28, 160)">
        <text y="0" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="600">ดูแลผู้สูงอายุสมองเสื่อม (Dementia)</text>
        <text x="476" y="0" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" text-anchor="end">620 เคส/สัปดาห์ <tspan fill="#28C76F" font-weight="700">↑ 15%</tspan></text>
        <rect y="12" width="476" height="12" rx="6" fill="#F8F8F8"/>
        <rect y="12" width="310" height="12" rx="6" fill="#FF9F43"/>
      </g>

      <!-- Skill 3 -->
      <g transform="translate(28, 230)">
        <text y="0" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="600">กายภาพบำบัดพื้นฐาน</text>
        <text x="476" y="0" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" text-anchor="end">410 เคส/สัปดาห์ <tspan fill="#28C76F" font-weight="700">↑ 8%</tspan></text>
        <rect y="12" width="476" height="12" rx="6" fill="#F8F8F8"/>
        <rect y="12" width="214" height="12" rx="6" fill="#00CFE8"/>
      </g>

      <!-- Skill 4 -->
      <g transform="translate(28, 300)">
        <text y="0" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="600">ดูแลผู้ป่วยพักฟื้นหลังผ่าตัด</text>
        <text x="476" y="0" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" text-anchor="end">320 เคส/สัปดาห์ <tspan fill="#28C76F" font-weight="700">↑ 5%</tspan></text>
        <rect y="12" width="476" height="12" rx="6" fill="#F8F8F8"/>
        <rect y="12" width="166" height="12" rx="6" fill="#B9B9C3"/>
      </g>

      <!-- Strategy Suggestion -->
      <g transform="translate(28, 380)">
        <rect width="476" height="100" rx="12" fill="#F8F8F8"/>
        <text x="16" y="30" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="700">💡 ข้อเสนอแนะเชิงกลยุทธ์:</text>
        <text x="16" y="54" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" width="440">ความต้องการดูแลผู้ป่วยติดเตียงเติบโตแบบก้าวกระโดด สถาบันควรเพิ่มรอบการอบรม</text>
        <text x="16" y="72" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" width="440">"Bedbound Specialty" เพื่อรองรับความต้องการที่ล้นตลาด</text>
      </g>

      <!-- Heatmap Card -->
      <g transform="translate(564, 0)">
        <rect width="532" height="520" rx="16" fill="white"/>
        <text x="28" y="44" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="18" font-weight="700">พื้นที่ขาดแคลนแรงงาน (Geographical Heatmap)</text>
        <text x="504" y="44" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" text-anchor="end">พื้นที่ที่มี Demand &gt; Supply</text>
        <line x1="28" y1="64" x2="504" y2="64" stroke="#F8F8F8"/>

        <!-- Simulated Map -->
        <g transform="translate(28, 84)">
          <rect width="476" height="250" rx="12" fill="#EAF2F8"/>
          <!-- Map Outline -->
          <path d="M120,50 Q180,30 250,50 T380,100 Q340,180 250,220 T120,200 Q80,120 120,50 Z" fill="#CBD5E0" stroke="white" stroke-width="1"/>
          <path d="M220,80 Q280,100 320,150 T250,200 Q180,170 220,80 Z" fill="#A0AEC0" stroke="white" stroke-width="1"/>
          
          <!-- Markers -->
          <circle cx="200" cy="90" r="10" fill="rgba(234, 84, 85, 0.4)" stroke="#EA5455" stroke-width="2"/>
          <circle cx="280" cy="160" r="15" fill="rgba(234, 84, 85, 0.6)" stroke="#EA5455" stroke-width="2"/>
          <circle cx="340" cy="110" r="8" fill="rgba(234, 84, 85, 0.4)" stroke="#EA5455" stroke-width="2"/>

          <!-- Legend -->
          <g transform="translate(320, 180)">
            <rect width="140" height="60" rx="8" fill="white" shadow="0 4px 8px rgba(0,0,0,0.1)"/>
            <rect x="12" y="12" width="12" height="12" rx="2" fill="#EA5455"/>
            <text x="32" y="23" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">ขาดแคลนวิกฤต</text>
            <rect x="12" y="34" width="12" height="12" rx="2" fill="rgba(234, 84, 85, 0.4)"/>
            <text x="32" y="45" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">ขาดแคลนปานกลาง</text>
          </g>
        </g>

        <!-- Top Areas List -->
        <g transform="translate(28, 354)">
          <text y="0" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="600">Top 3 พื้นที่โอกาสทอง:</text>
          <text x="12" y="24" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">1. <tspan fill="#1E1E1E" font-weight="700">บางนา-ตราด:</tspan> ความต้องการสูงแต่มีผู้ดูแลในพื้นที่น้อย</text>
          <text x="12" y="44" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">2. <tspan fill="#1E1E1E" font-weight="700">นนทบุรี (เมือง):</tspan> กลุ่มผู้สูงอายุอาศัยหนาแน่น มีการจองซ้ำสูง</text>
          <text x="12" y="64" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">3. <tspan fill="#1E1E1E" font-weight="700">พระราม 2:</tspan> พื้นที่กำลังขยายตัว มีการหาผู้ดูแลใหม่เพิ่มขึ้น 15%</text>
        </g>
      </g>
    </g>

    <!-- Employment Rate Card -->
    <g transform="translate(0, 802)">
      <rect width="1096" height="300" rx="16" fill="white"/>
      <text x="28" y="44" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="18" font-weight="700">ดัชนีความสำเร็จของผู้สำเร็จการศึกษา (Employment Rate)</text>
      <line x1="28" y1="64" x2="1068" y2="64" stroke="#F8F8F8"/>

      <!-- Circular Chart -->
      <g transform="translate(100, 100)">
        <circle cx="75" cy="75" r="75" fill="#F8F8F8"/>
        <path d="M75,0 A75,75 0 1,1 12,118 L75,75 Z" fill="#007A8C"/>
        <circle cx="75" cy="75" r="60" fill="white"/>
        <text x="75" y="85" fill="#007A8C" font-family="Inter, sans-serif" font-size="32" font-weight="700" text-anchor="middle">82%</text>
      </g>

      <!-- Content -->
      <g transform="translate(300, 100)">
        <text y="20" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="700">คนจบจากสถาบันคุณ "มีงานทำ" มากกว่าค่าเฉลี่ยตลาด</text>
        <text y="48" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="14">จากศิษย์เก่าทั้งหมด 1,240 คน มีผู้เปิดรับงานใน CareDee แล้ว 850 คน และในกลุ่มนั้น</text>
        <text y="68" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="14">700 คน (82%) ได้รับการจองงานอย่างน้อย 1 ครั้งภายใน 30 วันหลังเรียนจบ</text>

        <!-- Sub Stats -->
        <g transform="translate(0, 100)">
          <rect width="250" height="70" rx="12" fill="#F8F8F8"/>
          <text x="16" y="24" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">รายได้เฉลี่ยเดือนแรก</text>
          <text x="16" y="52" fill="#007A8C" font-family="Inter, sans-serif" font-size="18" font-weight="700">18,500 - 22,000 ฿</text>
          
          <g transform="translate(270, 0)">
            <rect width="250" height="70" rx="12" fill="#F8F8F8"/>
            <text x="16" y="24" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">คะแนนความพึงพอใจลูกค้า</text>
            <text x="16" y="52" fill="#28C76F" font-family="Inter, sans-serif" font-size="18" font-weight="700">4.8 / 5.0</text>
          </g>
        </g>
      </g>
    </g>

    <!-- Footer -->
    <text x="548" y="1250" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11" text-anchor="middle">* ข้อมูลคำนวณจากสถิติการใช้งานจริงบน CareDee Platform และ Update แบบ Real-time ทุก 24 ชั่วโมง</text>
  </g>
</svg>
