            <text y="14" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="600">น.ส. วิมล รักดี</text>
            <text y="32" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">092-888-XXXX</text>
            <rect x="288" y="2" width="80" height="28" rx="8" fill="#FF9F43"/>
            <text x="328" y="21" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600" text-anchor="middle">ส่งคำเชิญ</text>
            <line x1="0" y1="44" x2="368" y2="44" stroke="#F8F8F8"/>
          </g>

          <!-- Unmatched 3 -->
          <g transform="translate(0, 112)">
            <text y="14" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="600">นาย ประหยัด พอดี</text>
            <text y="32" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">085-444-XXXX</text>
