      <text x="680" y="126" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">วันที่จบ</text>
      <text x="800" y="126" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">รหัสใบรับรอง</text>
      <text x="960" y="126" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">สถานะระบบ</text>

