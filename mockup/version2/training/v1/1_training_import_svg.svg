        <text x="680" y="32" fill="#1E1E1E" font-family="Inter, sans-serif" font-size="14">15/05/2026</text>
        <text x="800" y="32" fill="#007A8C" font-family="Inter, sans-serif" font-size="14" font-weight="600">CERT-2026-001</text>
