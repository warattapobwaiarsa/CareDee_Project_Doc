            <tspan x="158" dy="20" text-anchor="middle">นำเข้าข้อมูลได้ถูกต้อง 100%</tspan>
          </text>
          <rect x="24" y="120" width="268" height="44" rx="8" fill="#F8F8F8"/>
          <text x="158" y="148" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600" text-anchor="middle">📥 ดาวน์โหลด Template (.xlsx)</text>
