            <text x="16" y="24" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">มีข้อผิดพลาด</text>
            <text x="16" y="52" fill="#EA5455" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="700">5 รายการ</text>
