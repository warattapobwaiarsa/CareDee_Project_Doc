    <rect x="1024" y="22" width="44" height="44" rx="12" fill="#E0F2F4"/>
    <text x="1046" y="49" fill="#007A8C" font-family="Inter, sans-serif" font-size="16" font-weight="700" text-anchor="middle">SM</text>

    <!-- Step 1 Card -->
    <g transform="translate(0, 120)">
