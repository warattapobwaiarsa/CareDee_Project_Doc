    <rect width="1096" height="88" rx="16" fill="white" shadow="0 4px 12px rgba(0,0,0,0.03)"/>
    <text x="28" y="40" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="700">1. นำเข้าข้อมูลการอบรม (Bulk Import)</text>
    <text x="28" y="62" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">จัดการข้อมูลผู้ผ่านการอบรมปริมาณมากอย่างมีประสิทธิภาพ</text>
    
    <!-- User Status -->
