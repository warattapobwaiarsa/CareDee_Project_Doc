  <!-- Active Item: นำเข้าข้อมูลการอบรม -->
  <rect x="0" y="210" width="280" height="48" fill="#E0F2F4"/>
  <rect x="276" y="210" width="4" height="48" fill="#007A8C"/>
  <text x="24" y="240" fill="#007A8C" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">📥 นำเข้าข้อมูลการอบรม</text>

  <text x="24" y="288" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">🏅 จัดการใบรับรอง</text>
  <text x="24" y="336" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">📈 สถิติตลาดแรงงาน</text>
  <text x="24" y="384" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">🛡️ นโยบายการตรวจสอบ</text>

