        <text x="28" y="90" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" width="368">รายชื่อเหล่านี้พบในไฟล์แต่ยังไม่ได้สมัครสมาชิก CareDee คุณสามารถส่งคำเชิญเพื่อให้พวกเขาได้รับ Digital Badge โดยอัตโนมัติเมื่อสมัคร</text>

