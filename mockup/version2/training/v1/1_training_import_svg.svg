            <text y="32" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">081-234-XXXX</text>
            <rect x="288" y="2" width="80" height="28" rx="8" fill="#FF9F43"/>
            <text x="328" y="21" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" font-weight="600" text-anchor="middle">ส่งคำเชิญ</text>
            <line x1="0" y1="44" x2="368" y2="44" stroke="#F8F8F8"/>
          </g>
          
