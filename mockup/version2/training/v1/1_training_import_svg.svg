        <text x="28" y="32" fill="#1E1E1E" font-family="Inter, sans-serif" font-size="14">3</text>
        <text x="80" y="32" fill="#EA5455" font-family="monospace" font-size="14" font-weight="700">12345 (Invalid)</text>
        <text x="260" y="32" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="500">นาย สมเกียรติ พากเพียร</text>
        <text x="450" y="32" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">การดูแลผู้ป่วยติดเตียง</text>
        <text x="680" y="32" fill="#1E1E1E" font-family="Inter, sans-serif" font-size="14">12/05/2026</text>
        <text x="800" y="32" fill="#007A8C" font-family="Inter, sans-serif" font-size="14" font-weight="600">CERT-2026-003</text>
        <rect x="960" y="14" width="80" height="24" rx="12" fill="#FFF5F5" stroke="#EA5455"/>
        <text x="1000" y="30" fill="#EA5455" font-family="Inter, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Error</text>
        <line x1="28" y1="52" x2="1068" y2="52" stroke="#F8F8F8"/>
