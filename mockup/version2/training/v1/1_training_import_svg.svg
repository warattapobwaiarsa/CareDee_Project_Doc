        <text x="350" y="60" fill="#1E1E1E" font-size="48" text-anchor="middle">📁</text>
        <text x="350" y="100" fill="#007A8C" font-family="IBM Plex Sans Thai, sans-serif" font-size="18" font-weight="700" text-anchor="middle">ลากและวางไฟล์ หรือ คลิกเพื่อเลือกไฟล์</text>
        <text x="350" y="124" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" text-anchor="middle">รองรับไฟล์ .csv, .xlsx เท่านั้น (ไม่เกิน 1,000 รายการต่อครั้ง)</text>

        <!-- Template Download -->
        <g transform="translate(724, 0)">
