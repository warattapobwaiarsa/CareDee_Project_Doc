        <text x="80" y="32" fill="#1E1E1E" font-family="monospace" font-size="14">3-4501-XXXXX-XX-X</text>
        <text x="260" y="32" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="500">นาย ธนพล รักงาน</text>
        <text x="450" y="32" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">การปฐมพยาบาลระดับสูง</text>
        <text x="680" y="32" fill="#1E1E1E" font-family="Inter, sans-serif" font-size="14">10/05/2026</text>
