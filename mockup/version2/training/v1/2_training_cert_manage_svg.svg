  <text x="24" y="290" fill="#007A8C" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">🏅 จัดการใบรับรอง</text>

  <text x="24" y="338" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">📈 สถิติตลาดแรงงาน</text>
  <text x="24" y="386" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="15" font-weight="500">🛡️ นโยบายการตรวจสอบ</text>

