        <text x="920" y="40" fill="#28C76F" font-family="Inter, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Verified</text>
        
        <text x="1072" y="40" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" text-anchor="end">เพิกถอน</text>
