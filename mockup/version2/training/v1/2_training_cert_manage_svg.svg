    <!-- Footer -->
    <text x="548" y="960" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11" text-anchor="middle">ฐานข้อมูลนี้เชื่อมต่อโดยตรงกับระบบยืนยันตัวตนของ CareDee Platform ทุกการเพิกถอนจะมีผลทันทีต่อสถานะผู้ดูแล</text>
