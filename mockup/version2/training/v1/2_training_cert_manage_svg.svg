        <text x="450" y="32" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">ผู้ดูแลผู้สูงอายุ (รุ่น 24)</text>
        <text x="450" y="50" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">หลักสูตร 420 ชั่วโมง</text>
        
