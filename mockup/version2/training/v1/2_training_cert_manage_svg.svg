        <text x="64" y="50" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">ID: 1-5503-XXXXX-XX-X</text>
        
        <text x="280" y="40" fill="#007A8C" font-family="monospace" font-size="14" font-weight="700">CERT-2025-442</text>
        
        <text x="450" y="32" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">ผู้ดูแลผู้สูงอายุ (รุ่น 22)</text>
        <text x="450" y="50" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">หลักสูตร 420 ชั่วโมง</text>
        
        <text x="680" y="32" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">12 มี.ค. 2568</text>
        <text x="680" y="50" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">-</text>
        
