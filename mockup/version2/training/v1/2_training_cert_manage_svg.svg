    <text x="28" y="62" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">ฐานข้อมูลศิษย์เก่าและการควบคุมความถูกต้องของใบรับรอง</text>
    
    <!-- User Status -->
