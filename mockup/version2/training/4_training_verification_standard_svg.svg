    <!-- Footer -->
    <text x="548" y="1120" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11" text-anchor="middle">ระบบทำงานภายใต้กรอบการตรวจสอบความปลอดภัยข้อมูลสากล ข้อมูลการยืนยันจะถูกจัดเก็บเป็นหลักฐานพยานในระบบ Cloud</text>
