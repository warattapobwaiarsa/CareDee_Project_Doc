          <text x="434" y="39" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" text-anchor="middle">ดูเอกสาร</text>
          <rect x="380" y="60" width="108" height="40" rx="8" fill="#F8F8F8" stroke="#FF9F43" stroke-dasharray="4 2"/>
          <text x="434" y="85" fill="#FF9F43" font-family="IBM Plex Sans Thai, sans-serif" font-size="12" text-anchor="middle">อัปเดตไฟล์ใหม่</text>
        </g>
