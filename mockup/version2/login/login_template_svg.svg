<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="800" fill="#F8F8F8"/>
  
  <!-- Login Wrapper Shadow -->
  <rect x="145" y="105" width="1000" height="600" rx="20" fill="black" fill-opacity="0.05"/>
  
  <!-- Login Wrapper -->
  <rect x="140" y="100" width="1000" height="600" rx="20" fill="white"/>
  
  <!-- Branding Side -->
  <path d="M140 120C140 108.954 148.954 100 160 100H690V700H160C148.954 700 140 691.046 140 680V120Z" fill="url(#paint0_linear)"/>
  
  <!-- Decorative Circle in Branding Side -->
  <circle cx="690" cy="100" r="150" fill="white" fill-opacity="0.05"/>
  
  <!-- Logo Section (Branding) -->
  <rect x="188" y="248" width="64" height="64" rx="12" fill="white"/>
  <text x="220" y="288" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="24" font-weight="700" fill="#007A8C" text-anchor="middle">CD</text>
  
  <text x="188" y="348" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="32" font-weight="700" fill="white">ดูแลคนที่คุณรัก</text>
  <text x="188" y="390" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="32" font-weight="700" fill="white">ด้วยมืออาชีพจาก CareDee</text>
  
  <text x="188" y="440" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="18" fill="white" fill-opacity="0.9">แพลตฟอร์มที่รวมผู้ดูแลคุณภาพและสถาบันฝึกอบรมชั้นนำ</text>
  <text x="188" y="465" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="18" fill="white" fill-opacity="0.9">เพื่อความอุ่นใจของทุกคนในครอบครัว</text>
  
  <!-- Form Side -->
  <text x="738" y="248" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="28" font-weight="700" fill="#1E1E1E">เข้าสู่ระบบ</text>
  <text x="738" y="278" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="14" fill="#6E6B7B">กรุณากรอกข้อมูลเพื่อเข้าใช้งานระบบ</text>
  
  <!-- Form Group: Email -->
  <text x="738" y="338" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="14" font-weight="500" fill="#1E1E1E">อีเมล / ชื่อผู้ใช้งาน</text>
  <rect x="738" y="348" width="354" height="44" rx="8" stroke="#B9B9C3" stroke-width="1"/>
  <text x="754" y="376" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="16" fill="#B9B9C3">example@email.com</text>
  
  <!-- Form Group: Password -->
  <text x="738" y="418" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="14" font-weight="500" fill="#1E1E1E">รหัสผ่าน</text>
  <rect x="738" y="428" width="354" height="44" rx="8" stroke="#B9B9C3" stroke-width="1"/>
  <text x="754" y="456" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="16" fill="#B9B9C3">••••••••</text>
  
  <!-- Form Footer -->
  <rect x="738" y="486" width="14" height="14" rx="2" stroke="#B9B9C3" stroke-width="1"/>
  <text x="760" y="498" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="14" fill="#6E6B7B">จดจำฉัน</text>
  <text x="1092" y="498" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="14" font-weight="500" fill="#007A8C" text-anchor="end">ลืมรหัสผ่าน?</text>
  
  <!-- Login Button -->
  <rect x="738" y="526" width="354" height="48" rx="8" fill="#007A8C"/>
  <text x="915" y="556" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">เข้าสู่ระบบ</text>
  
  <!-- Register Link -->
  <text x="915" y="606" font-family="'IBM Plex Sans Thai', 'Inter', sans-serif" font-size="14" fill="#6E6B7B" text-anchor="middle">
    ยังไม่มีบัญชี? <tspan fill="#FF9F43" font-weight="600">ลงทะเบียนใหม่</tspan>
  </text>
  
  <defs>
    <linearGradient id="paint0_linear" x1="140" y1="100" x2="690" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#007A8C"/>
      <stop offset="1" stop-color="#005A68"/>
    </linearGradient>
  </defs>
</svg>