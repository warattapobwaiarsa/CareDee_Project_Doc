                <text x="180" y="35" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14">Sarah Connor</text>
                <text x="400" y="35" fill="#FF9F43" font-family="Inter, sans-serif" font-size="14" font-weight="700">UPDATE CONFIG</text>
                <text x="600" y="35" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14">ปรับ Matching Weight: Distance = 70%</text>
                <text x="920" y="35" fill="#1E1E1E" font-family="Inter, sans-serif" font-size="14">192.168.1.12</text>
