                <text x="180" y="35" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14">Michael Jackson</text>
                <text x="400" y="35" fill="#28C76F" font-family="Inter, sans-serif" font-size="14" font-weight="700">RESOLVE DISPUTE</text>
                <text x="600" y="35" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14">อนุมัติคำอุทธรณ์ #AP-990 (ลบรีวิว)</text>
                <text x="920" y="35" fill="#1E1E1E" font-family="Inter, sans-serif" font-size="14">192.168.1.45</text>
