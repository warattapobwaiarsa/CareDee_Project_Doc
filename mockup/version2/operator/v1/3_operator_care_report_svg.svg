                    <text x="24" y="8" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="11" font-weight="600">11:15 น.</text>
                    <text x="24" y="25" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13"><tspan font-weight="700">🚨 Incident:</tspan> #BK-7755 ความดันโลหิตสูง</text>

                    <g transform="translate(0, 50)">
