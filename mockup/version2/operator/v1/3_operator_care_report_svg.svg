                        <text x="24" y="8" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="11" font-weight="600">10:30 น.</text>
                        <text x="24" y="25" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13"><tspan font-weight="700">✅ Report:</tspan> #BK-7721 ส่งบันทึกช่วงเช้า</text>
                    </g>

                    <g transform="translate(0, 100)">
