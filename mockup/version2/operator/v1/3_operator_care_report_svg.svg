                        <text x="24" y="8" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="11" font-weight="600">09:00 น.</text>
                        <text x="24" y="25" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13"><tspan font-weight="700">📍 Check-in:</tspan> ผู้ดูแล 12 ท่านเข้างานตรงจุด</text>
                    </g>

