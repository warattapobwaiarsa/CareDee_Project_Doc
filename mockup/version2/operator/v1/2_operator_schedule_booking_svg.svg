<svg width="1440" height="1100" viewBox="0 0 1440 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1440" height="1100" fill="#F8F8F8"/>

  <!-- Sidebar -->
  <rect width="280" height="1100" fill="#004D58"/>
  <rect x="118" y="32" width="44" height="44" rx="10" fill="white"/>
  <text x="140" y="62" text-anchor="middle" fill="#007A8C" font-family="Inter, sans-serif" font-size="20" font-weight="700">CD</text>
  <text x="140" y="105" text-anchor="middle" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="22" font-weight="700">CareDee</text>
  <text x="140" y="125" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="IBM Plex Sans Thai, sans-serif" font-size="11" font-weight="400">SERVICE OPERATOR PORTAL</text>
  
  <line x1="20" y1="145" x2="260" y2="145" stroke="rgba(255,255,255,0.1)"/>

  <!-- Sidebar Menu -->
