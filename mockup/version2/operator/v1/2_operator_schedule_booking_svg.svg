                <text x="60" y="22" text-anchor="middle" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11" font-weight="600">ผู้ดูแล</text>
                <g transform="translate(120, 0)">
                    <rect width="547" height="35" fill="#F8F8F8" stroke="#B9B9C3"/>
                    <text x="25" y="22" text-anchor="middle" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="10" font-weight="600">08:00</text>
                    <text x="75" y="22" text-anchor="middle" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="10" font-weight="600">10:00</text>
                    <text x="125" y="22" text-anchor="middle" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="10" font-weight="600">12:00</text>
                    <text x="175" y="22" text-anchor="middle" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="10" font-weight="600">14:00</text>
                    <text x="225" y="22" text-anchor="middle" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="10" font-weight="600">16:00</text>
                    <text x="275" y="22" text-anchor="middle" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="10" font-weight="600">18:00</text>
                </g>

                <!-- Row 1: Vipawee -->
                <g transform="translate(0, 35)">
                    <rect width="120" height="50" fill="white" stroke="#F8F8F8"/>
                    <text x="14" y="30" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">น.ส. วิภาวี</text>
                    <g transform="translate(120, 0)">
                        <rect width="547" height="50" fill="white" stroke="#F8F8F8"/>
                        <!-- Booking Bar 1 -->
                        <rect x="0" y="8" width="150" height="34" rx="4" fill="#E0F2F4"/>
                        <rect x="0" y="8" width="4" height="34" fill="#007A8C"/>
                        <text x="10" y="29" fill="#007A8C" font-family="Inter, sans-serif" font-size="10" font-weight="600">#BK-7721 (สมหญิง)</text>
                        <!-- Conflict Bar -->
                        <rect x="250" y="8" width="125" height="34" rx="4" fill="rgba(234, 84, 85, 0.12)"/>
                        <rect x="250" y="8" width="4" height="34" fill="#EA5455"/>
                        <text x="260" y="29" fill="#EA5455" font-family="Inter, sans-serif" font-size="10" font-weight="600">⚠️ Conflict (#BK-7750)</text>
                    </g>
                </g>

                <!-- Row 2: Raveewan -->
                <g transform="translate(0, 85)">
                    <rect width="120" height="50" fill="white" stroke="#F8F8F8"/>
                    <text x="14" y="30" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">น.ส. รวีวรรณ</text>
                    <g transform="translate(120, 0)">
                        <rect width="547" height="50" fill="white" stroke="#F8F8F8"/>
                        <rect x="400" y="8" width="147" height="34" rx="4" fill="#E0F2F4"/>
                        <rect x="400" y="8" width="4" height="34" fill="#007A8C"/>
                        <text x="410" y="29" fill="#007A8C" font-family="Inter, sans-serif" font-size="10" font-weight="600">#BK-7780 (วิชัย)</text>
                    </g>
                </g>

                <!-- Row 3: Somkid -->
                <g transform="translate(0, 135)">
                    <rect width="120" height="50" fill="white" stroke="#F8F8F8"/>
                    <text x="14" y="30" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">นาย สมคิด</text>
                    <g transform="translate(120, 0)">
                        <rect width="547" height="50" fill="white" stroke="#F8F8F8"/>
                        <rect x="50" y="8" width="100" height="34" rx="4" fill="#E0F2F4"/>
                        <rect x="50" y="8" width="4" height="34" fill="#007A8C"/>
                        <text x="60" y="29" fill="#007A8C" font-family="Inter, sans-serif" font-size="10" font-weight="600">#BK-7718 (มานี)</text>
                    </g>
                </g>
            </g>

            <!-- Booking Table Card -->
