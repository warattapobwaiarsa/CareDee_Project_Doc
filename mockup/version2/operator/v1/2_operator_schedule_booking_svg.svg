    <text x="25" y="32" fill="rgba(255,255,255,0.7)" font-family="IBM Plex Sans Thai, sans-serif" font-size="15">🏠 หน้าหลัก Dashboard</text>
    <text x="25" y="82" fill="rgba(255,255,255,0.7)" font-family="IBM Plex Sans Thai, sans-serif" font-size="15">👥 จัดการทีมผู้ดูแล (Team)</text>
    
    <!-- Active Menu Item -->
    <g transform="translate(0, 100)">
      <rect width="280" height="50" fill="rgba(255,255,255,0.1)"/>
      <rect width="4" height="50" fill="#FF9F43"/>
      <text x="25" y="32" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="15">📅 ตารางงาน &amp; การจอง</text>
    </g>
    
    <text x="25" y="182" fill="rgba(255,255,255,0.7)" font-family="IBM Plex Sans Thai, sans-serif" font-size="15">📋 ติดตามรายงานหน้างาน</text>
    <text x="25" y="232" fill="rgba(255,255,255,0.7)" font-family="IBM Plex Sans Thai, sans-serif" font-size="15">⚠️ ข้อร้องเรียน &amp; อุทธรณ์</text>
    <text x="25" y="282" fill="rgba(255,255,255,0.7)" font-family="IBM Plex Sans Thai, sans-serif" font-size="15">📊 รายงาน &amp; รายได้</text>
  </g>

  <g transform="translate(0, 1020)">
    <line x1="20" y1="0" x2="260" y2="0" stroke="rgba(255,255,255,0.1)"/>
    <text x="25" y="40" fill="rgba(255,255,255,0.7)" font-family="IBM Plex Sans Thai, sans-serif" font-size="15">🚪 ออกจากระบบ</text>
  </g>

  <!-- Main Content Area -->
  <g transform="translate(312, 32)">
    <!-- Header -->
    <rect width="1096" height="80" rx="16" fill="white" filter="url(#shadow)"/>
    <text x="28" y="35" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="700">ตารางงาน &amp; การจอง (Schedule &amp; Booking Control)</text>
    <text x="28" y="55" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">บริหารจัดการคิวงาน ป้องกันตารางซ้อน และปรับจูนระบบ Matching</text>
    
    <g transform="translate(850, 16)">
        <text x="180" y="20" text-anchor="end" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="600">Michael Jackson</text>
        <text x="180" y="38" text-anchor="end" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">Operator Manager</text>
        <rect x="195" y="0" width="48" height="48" rx="12" fill="#E0F2F4"/>
        <text x="219" y="30" text-anchor="middle" fill="#007A8C" font-family="Inter, sans-serif" font-size="16" font-weight="700">MJ</text>
    </g>

    <!-- Alert -->
    <g transform="translate(0, 104)">
        <rect width="1096" height="48" rx="12" fill="rgba(234, 84, 85, 0.12)" stroke="#EA5455"/>
        <text x="20" y="29" fill="#EA5455" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="500">⚠️ <tspan font-weight="700">Double Booking Warning:</tspan> พบข้อผิดพลาด 1 รายการ - ผู้ดูแล "น.ส. วิภาวี" มีงานซ้อนในช่วงเวลา 13:00 - 15:00 น.</text>
    </g>

    <!-- Layout Grid -->
    <g transform="translate(0, 176)">
        <!-- Left Column -->
        <g transform="translate(0, 0)">
            <!-- Master Schedule Card -->
            <rect width="715" height="350" rx="16" fill="white" filter="url(#shadow)"/>
            <text x="24" y="40" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="18" font-weight="600">📅 Master Schedule (Daily View - Today)</text>
            <g transform="translate(540, 24)">
                <rect width="70" height="28" rx="8" stroke="#007A8C" fill="white"/>
                <text x="35" y="19" text-anchor="middle" fill="#007A8C" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">ก่อนหน้า</text>
                <rect x="78" width="70" height="28" rx="8" stroke="#007A8C" fill="white"/>
                <text x="113" y="19" text-anchor="middle" fill="#007A8C" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">ถัดไป</text>
            </g>

            <g transform="translate(24, 70)">
