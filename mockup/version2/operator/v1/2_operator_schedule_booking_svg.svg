                <text x="24" y="40" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="18" font-weight="600">📋 รายละเอียดการจอง &amp; การจัดสรรงาน</text>
                <g transform="translate(24, 65)">
