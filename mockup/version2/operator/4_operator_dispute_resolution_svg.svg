        <text x="100" y="25" text-anchor="middle" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="600">อุทธรณ์รีวิว (Appeals)</text>
        <rect x="175" y="10" width="18" height="18" rx="9" fill="rgba(255, 159, 67, 0.2)"/>
        <text x="184" y="23" text-anchor="middle" fill="#FF9F43" font-family="Inter, sans-serif" font-size="10" font-weight="700">8</text>

