                </text>
                <text x="24" y="90" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">
                    <tspan font-weight="700">07:58 - คุณสมหญิง:</tspan> "โอเคค่ะ เข้ามาได้เลยจ้า"
                </text>
                
                <text x="16" y="130" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="700">📍 พิกัดเช็กอิน (Check-in Log)</text>
                <text x="16" y="150" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">
                    เวลา: 08:00:05 (ตรงเวลา)<br/>
                    สถานะ: นอกรัศมี 800 เมตร (False Positive Flag)
                </text>

                <!-- Action Area -->
                <g transform="translate(0, 200)">
                    <line x1="0" y1="0" x2="332" y2="0" stroke="#F8F8F8"/>
                    <text x="0" y="30" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">ตัดสินผลการพิจารณา:</text>
                    
                    <rect y="45" width="332" height="40" rx="10" fill="#007A8C"/>
                    <text x="166" y="70" text-anchor="middle" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">✅ ยอมรับคำอุทธรณ์ (ลบรีวิวนี้)</text>
                    
                    <text x="166" y="100" text-anchor="middle" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="10">คะแนนเฉลี่ยของผู้ดูแลจะถูกคำนวณใหม่</text>
                    
                    <rect y="115" width="332" height="40" rx="10" fill="white" stroke="#007A8C" stroke-width="1"/>
                    <text x="166" y="140" text-anchor="middle" fill="#007A8C" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">⚖️ ยอมรับบางส่วน (แก้ไขข้อความ)</text>
                    
                    <rect y="165" width="332" height="40" rx="10" fill="#EA5455"/>
                    <text x="166" y="190" text-anchor="middle" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">❌ ปฏิเสธคำอุทธรณ์ (คงรีวิวไว้)</text>
                    
                    <text x="0" y="230" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">บันทึกเหตุผลการตัดสิน (Internal Only):</text>
                    <rect y="240" width="332" height="60" rx="8" fill="white" stroke="#B9B9C3" stroke-width="1"/>
                    <text x="10" y="258" fill="#B9B9C3" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">ระบุเหตุผลเพื่อใช้เป็น Audit Trail...</text>
                    
                    <rect y="315" width="332" height="40" rx="10" fill="white" stroke="#B9B9C3" stroke-width="1"/>
                    <text x="166" y="340" text-anchor="middle" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="600">📩 ส่งข้อความแจ้งผล (ทั้ง 2 ฝ่าย)</text>
                </g>
            </g>

            <!-- Policy Tip -->
            <g transform="translate(0, 620)">
                <rect width="380" height="100" rx="16" fill="#FFF3E6"/>
                <text x="24" y="30" fill="#FF9F43" font-family="IBM Plex Sans Thai, sans-serif" font-size="14" font-weight="700">💡 นโยบายการตัดสิน</text>
                <text x="24" y="55" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">
                    ตามมาตรฐาน CareDee หากมีหลักฐานแชทชัดเจนว่าลูกค้า
                </text>
                <text x="24" y="70" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">
                    ทราบปัญหาเทคนิคและการให้บริการยังคงเป็นปกติ ให้พิจารณา
                </text>
                <text x="24" y="85" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">
                    ลบรีวิวเพื่อรักษาความเป็นธรรมแก่ผู้ดูแล
                </text>
            </g>
        </g>
