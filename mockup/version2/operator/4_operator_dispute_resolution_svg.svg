    <text x="28" y="55" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">จัดการความขัดแย้งและตัดสินคำอุทธรณ์ตาม SLA ภายใน 3 วันทำการ</text>
    
    <g transform="translate(850, 16)">
