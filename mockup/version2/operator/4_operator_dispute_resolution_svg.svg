                <text x="560" y="28" text-anchor="middle" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="11" font-weight="700">เหลือเวลา 1 วัน 4 ชม.</text>
                
                <text x="16" y="55" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">
