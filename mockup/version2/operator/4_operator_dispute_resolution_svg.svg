        <text x="180" y="38" text-anchor="end" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">Operator Manager</text>
        <rect x="195" y="0" width="48" height="48" rx="12" fill="#E0F2F4"/>
