                    </text>
                    
                    <rect x="16" y="115" width="100" height="22" rx="11" fill="rgba(0, 207, 232, 0.12)"/>
                    <text x="66" y="130" text-anchor="middle" fill="#00CFE8" font-family="IBM Plex Sans Thai, sans-serif" font-size="11" font-weight="700">กำลังตรวจสอบ</text>
                    
                    <rect x="125" y="115" width="130" height="22" rx="11" fill="#F8F8F8"/>
                    <text x="190" y="130" text-anchor="middle" fill="#6E6B7B" font-family="Inter, sans-serif" font-size="11" font-weight="600">Customer Complaint</text>
                </g>
            </g>
        </g>

        <!-- Right Column (Detail) -->
        <g transform="translate(716, 0)">
            <!-- Detail Card -->
            <rect width="380" height="600" rx="16" fill="white" filter="url(#shadow)"/>
            <text x="24" y="40" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="18" font-weight="600">รายละเอียดเคส #AP-990</text>
            
            <g transform="translate(24, 65)">
                <!-- Evidence Box -->
                <rect width="332" height="180" rx="12" fill="#F8F8F8"/>
                <text x="16" y="30" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13" font-weight="700">💬 แชทหลักฐาน (Chat Snippet)</text>
                
                <line x1="16" y1="45" x2="16" y2="105" stroke="#B9B9C3" stroke-width="2"/>
                <text x="24" y="55" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">
                    <tspan font-weight="700">07:55 - รวีวรรณ:</tspan> "สวัสดีค่ะคุณสมหญิง ตอนนี้ถึง
                </text>
                <text x="24" y="70" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="11">
