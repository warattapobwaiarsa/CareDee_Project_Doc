                    <rect x="500" y="14" width="120" height="20" rx="4" fill="#B9B9C3"/>
                    <text x="560" y="28" text-anchor="middle" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="11" font-weight="700">เหลือเวลา 2 วัน 18 ชม.</text>
                    
                    <text x="16" y="55" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">
                        <tspan font-weight="700">ผู้ดูแล:</tspan> น.ส. วิภาวี รักเรียน | <tspan font-weight="700">จอง:</tspan> #BK-7788 | <tspan font-weight="700">ระดับ:</tspan> <tspan fill="#FF9F43">★★☆☆☆ (2 ดาว)</tspan>
                    </text>
                    <text x="16" y="85" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">
                        "อุทธรณ์รีวิว: ลูกค้าติเรื่องการสื่อสาร แต่ผู้ดูแลยืนยันว่าทำตามคำแนะนำพยาบาลจาก TI ทุกขั้นตอน"
                    </text>
                </g>

                <!-- Item 3 -->
                <g transform="translate(0, 322)">
                    <rect width="636" height="150" rx="12" fill="white" stroke="#F8F8F8" stroke-width="1"/>
                    <text x="16" y="28" fill="#007A8C" font-family="Inter, sans-serif" font-size="14" font-weight="700">#CP-102</text>
                    <rect x="500" y="14" width="120" height="20" rx="4" fill="#B9B9C3"/>
                    <text x="560" y="28" text-anchor="middle" fill="white" font-family="IBM Plex Sans Thai, sans-serif" font-size="11" font-weight="700">เหลือเวลา 2 วัน 22 ชม.</text>
                    
                    <text x="16" y="55" fill="#6E6B7B" font-family="IBM Plex Sans Thai, sans-serif" font-size="12">
                        <tspan font-weight="700">ลูกค้า:</tspan> คุณมานพ | <tspan font-weight="700">ผู้ดูแล:</tspan> น.ส. วิภาวี | <tspan font-weight="700">จอง:</tspan> #BK-7755
                    </text>
                    <text x="16" y="85" fill="#1E1E1E" font-family="IBM Plex Sans Thai, sans-serif" font-size="13">
