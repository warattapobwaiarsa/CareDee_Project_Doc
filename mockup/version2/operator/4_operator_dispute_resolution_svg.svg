    <text x="25" y="132" fill="rgba(255,255,255,0.7)" font-family="IBM Plex Sans Thai, sans-serif" font-size="15">📅 ตารางงาน &amp; การจอง</text>
    <text x="25" y="182" fill="rgba(255,255,255,0.7)" font-family="IBM Plex Sans Thai, sans-serif" font-size="15">📋 ติดตามรายงานหน้างาน</text>
    
    <!-- Complaints Active -->
