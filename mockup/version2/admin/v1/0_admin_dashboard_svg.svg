        <text x="42" y="106" fill="#6E6B7B" font-family="IBM Plex Sans Thai" font-size="13" font-weight="600">ID รายการ</text>
        <text x="180" y="106" fill="#6E6B7B" font-family="IBM Plex Sans Thai" font-size="13" font-weight="600">ผู้ยื่นคำร้อง</text>
        <text x="350" y="106" fill="#6E6B7B" font-family="IBM Plex Sans Thai" font-size="13" font-weight="600">วันที่ยื่น</text>
        <text x="480" y="106" fill="#6E6B7B" font-family="IBM Plex Sans Thai" font-size="13" font-weight="600">เหลือเวลา</text>
        <text x="600" y="106" fill="#6E6B7B" font-family="IBM Plex Sans Thai" font-size="13" font-weight="600">จัดการ</text>

        <g transform="translate(0, 120)">
