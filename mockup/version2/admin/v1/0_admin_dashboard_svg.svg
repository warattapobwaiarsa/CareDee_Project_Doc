      <text x="182" y="48" text-anchor="middle" fill="#1E1E1E" font-family="IBM Plex Sans Thai" font-size="18" font-weight="700">สถานะทรัพยากรระบบ</text>
      
      <!-- Health Circle -->
      <circle cx="182" cy="150" r="70" stroke="#F8F8F8" stroke-width="12" fill="none"/>
      <path d="M182 80 A 70 70 0 0 1 252 150" stroke="#28C76F" stroke-width="12" fill="none" stroke-linecap="round"/>
      <text x="182" y="155" text-anchor="middle" fill="#1E1E1E" font-family="Inter" font-size="32" font-weight="700">45%</text>
      <text x="182" y="175" text-anchor="middle" fill="#6E6B7B" font-family="IBM Plex Sans Thai" font-size="11" font-weight="400">CPU LOAD</text>
      
      <text x="182" y="245" text-anchor="middle" fill="#1E1E1E" font-family="IBM Plex Sans Thai" font-size="14" font-weight="600">Memory Usage: 3.2 / 8 GB</text>
      
