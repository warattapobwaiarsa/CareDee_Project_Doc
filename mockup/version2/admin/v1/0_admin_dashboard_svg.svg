    <text x="24" y="76" fill="#1E1E1E" font-family="IBM Plex Sans Thai" font-size="28" font-weight="700">42 รายการ</text>
    <text x="24" y="100" fill="#28C76F" font-family="IBM Plex Sans Thai" font-size="12" font-weight="500">↑ 12% จากเมื่อวาน</text>

