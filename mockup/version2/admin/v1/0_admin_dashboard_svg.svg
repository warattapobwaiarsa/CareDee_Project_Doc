        <text x="28" y="48" fill="#1E1E1E" font-family="IBM Plex Sans Thai" font-size="18" font-weight="700">สร้างรายงานด่วน</text>
        
        <rect x="24" y="70" width="316" height="44" rx="8" fill="#E0F2F4"/>
        <text x="44" y="98" fill="#007A8C" font-family="IBM Plex Sans Thai" font-size="13" font-weight="600">📊 สรุปรายได้ (CSV)</text>
        
        <rect x="24" y="124" width="316" height="44" rx="8" fill="#E0F2F4"/>
        <text x="44" y="152" fill="#007A8C" font-family="IBM Plex Sans Thai" font-size="13" font-weight="600">📋 สถิติทักษะตลาด (XLSX)</text>
        
        <rect x="24" y="178" width="316" height="44" rx="8" fill="#FF9F43"/>
        <text x="44" y="206" fill="white" font-family="IBM Plex Sans Thai" font-size="13" font-weight="600">⚙️ ตั้งค่าคอมมิชชัน</text>
