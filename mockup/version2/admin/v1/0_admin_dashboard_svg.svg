      <path d="M0 16C0 7.16344 7.16344 0 16 0H20V120H16C7.16344 120 0 112.837 0 104V16Z" fill="#00CFE8"/>
      <text x="24" y="36" fill="#6E6B7B" font-family="IBM Plex Sans Thai" font-size="14" font-weight="500">รายได้รวม (เดือนนี้)</text>
