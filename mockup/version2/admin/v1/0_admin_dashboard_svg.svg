      <text x="182" y="285" text-anchor="middle" fill="#007A8C" font-family="IBM Plex Sans Thai" font-size="12">
        <tspan font-weight="700">Elastic Scaling:</tspan> สแตนด์บาย (Threshold: 70%)
      </text>

