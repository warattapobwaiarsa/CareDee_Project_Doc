        <text x="636" y="31" text-anchor="middle" fill="#007A8C" font-family="IBM Plex Sans Thai" font-size="13" font-weight="600">ตรวจเอกสาร</text>
        <line x1="28" y1="56" x2="692" y2="56" stroke="#F8F8F8"/>
