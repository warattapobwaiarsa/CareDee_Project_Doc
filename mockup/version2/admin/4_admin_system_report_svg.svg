<svg width="1440" height="1080" viewBox="0 0 1440 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1440" height="1080" fill="#F8F8F8"/>

  <!-- Sidebar -->
  <rect width="260" height="1080" fill="#004D58"/>
  <rect x="108" y="32" width="44" height="44" rx="10" fill="white"/>
  <text x="130" y="62" text-anchor="middle" fill="#007A8C" font-family="Inter" font-size="20" font-weight="700">CD</text>
  <text x="130" y="96" text-anchor="middle" fill="white" font-family="IBM Plex Sans Thai" font-size="20" font-weight="700">CareDee Admin</text>
  <text x="130" y="112" text-anchor="middle" fill="white" fill-opacity="0.5" font-family="IBM Plex Sans Thai" font-size="11" font-weight="400">SYSTEM CONTROL PANEL</text>
  
  <line x1="20" y1="130" x2="240" y2="130" stroke="white" stroke-opacity="0.1"/>

  <!-- Sidebar Menu -->
  <g transform="translate(0, 150)">
