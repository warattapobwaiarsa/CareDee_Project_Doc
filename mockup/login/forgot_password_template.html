<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน | CareDee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-600: #007A8C;
            --primary-100: #E0F2F4;
            --primary-700: #006675;
            
            --white: #FFFFFF;
            --neutral-100: #F8F8F8;
            --neutral-200: #EBEBED;
            --neutral-300: #B9B9C3;
            --neutral-600: #6E6B7B;
            --neutral-900: #1E1E1E;
            
            --font-main: 'IBM Plex Sans Thai', 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--neutral-100);
            color: var(--neutral-900);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 500px;
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* Branding Side */
        .branding-side {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-600) 0%, #005A68 100%);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .branding-side::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
        }

        .branding-side::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
        }

        .brand-logo {
            width: 180px;
            height: auto;
            margin-bottom: 30px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            transition: all 0.3s ease;
        }

        .brand-logo:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        .branding-side h2 {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.4;
        }

        /* Form Side */
        .form-side {
            width: 450px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--white);
        }

        .back-link {
            color: var(--neutral-600);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-600);
        }

        .form-header { margin-bottom: 32px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; color: var(--neutral-900); }
        p.subtitle { font-size: 14px; color: var(--neutral-600); line-height: 1.5; }

        .form-group { margin-bottom: 24px; position: relative; }
        .form-group label {
            display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: var(--neutral-900);
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.input-icon { position: absolute; left: 14px; color: var(--neutral-300); transition: color 0.2s; }
        
        .form-control {
            width: 100%; padding: 12px 16px 12px 42px; font-size: 15px;
            border: 1.5px solid var(--neutral-200); border-radius: 10px;
            transition: all 0.2s ease; outline: none; color: var(--neutral-900); background-color: #fafafa;
        }
        .form-control:focus {
            border-color: var(--primary-600); background-color: var(--white); box-shadow: 0 0 0 4px var(--primary-100);
        }
        .form-control:focus + i.input-icon { color: var(--primary-600); }

        .btn-submit {
            width: 100%; padding: 14px; background-color: var(--primary-600); color: white;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-submit:hover {
            background-color: var(--primary-700); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 122, 140, 0.2);
        }

        /* Success State (Hidden by default) */
        #success-state {
            display: none;
            text-align: center;
            flex-direction: column;
            align-items: center;
        }
        
        .success-icon {
            width: 70px; height: 70px;
            background-color: #E8F9F0; color: #28C76F;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin-bottom: 24px;
        }

        .btn-outline {
            background: transparent; border: 1.5px solid var(--primary-600); color: var(--primary-600); margin-top: 20px;
        }
        .btn-outline:hover { background: var(--primary-50); box-shadow: none; transform: none; }

        @media (max-width: 800px) {
            .branding-side { display: none; }
            .auth-wrapper { max-width: 450px; }
            .form-side { width: 100%; padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="branding-side">
            <img src="../../logo/caredee_v2.png" alt="CareDee Logo" class="brand-logo" />
            <h2>ความอุ่นใจ<br>เริ่มต้นที่นี่</h2>
        </div>

        <div class="form-side">
            <div id="form-state">
                <a href="login_template.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> กลับไปหน้าเข้าสู่ระบบ
                </a>
                
                <div class="form-header">
                    <h1>ลืมรหัสผ่าน?</h1>
                    <p class="subtitle">กรอกอีเมลที่คุณใช้ลงทะเบียน เราจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้คุณ</p>
                </div>

                <form id="reset-form">
                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">
                        ส่งลิงก์รีเซ็ตรหัสผ่าน
                    </button>
                </form>
            </div>

            <!-- Success State -->
            <div id="success-state">
                <div class="success-icon">
                    <i class="fas fa-paper-plane"></i>
                </div>
                <h1 style="font-size: 24px;">ส่งอีเมลสำเร็จ!</h1>
                <p class="subtitle" style="margin-bottom: 24px; max-width: 300px;">
                    เราได้ส่งลิงก์สำหรับรีเซ็ตรหัสผ่านไปที่อีเมลของคุณแล้ว กรุณาตรวจสอบกล่องจดหมาย (รวมถึง Junk/Spam)
                </p>
                <a href="login_template.html" class="btn-submit btn-outline" style="text-decoration: none;">กลับไปหน้าเข้าสู่ระบบ</a>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('reset-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('.btn-submit');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> กำลังส่ง...';
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';

            // Simulate API Request
            setTimeout(() => {
                document.getElementById('form-state').style.display = 'none';
                document.getElementById('success-state').style.display = 'flex';
            }, 1200);
        });
    </script>

</body>
</html>
