<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน | CareDee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Brand Colors */
            --primary-600: #007A8C;
            --primary-100: #E0F2F4;
            --primary-700: #006675;
            --secondary-500: #FF9F43;
            
            /* Semantic Colors */
            --success: #28C76F;
            --error: #EA5455;
            
            /* Neutral Colors */
            --white: #FFFFFF;
            --neutral-100: #F8F8F8;
            --neutral-200: #EBEBED;
            --neutral-300: #B9B9C3;
            --neutral-600: #6E6B7B;
            --neutral-900: #1E1E1E;
            
            /* Typography */
            --font-main: 'IBM Plex Sans Thai', 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--neutral-100);
            color: var(--neutral-900);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-wrapper {
            display: flex;
            width: 100%;
            max-width: 1000px;
            min-height: 650px;
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* Branding Side */
        .branding-side {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-600) 0%, #005A68 100%);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .branding-side::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
        }

        .branding-side::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
        }

        .brand-logo {
            width: 180px;
            height: auto;
            margin-bottom: 40px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            transition: all 0.3s ease;
        }

        .brand-logo:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        .branding-side h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .branding-side p {
            font-size: 18px;
            opacity: 0.9;
            line-height: 1.7;
            font-weight: 300;
        }

        /* Form Side */
        .form-side {
            width: 500px;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--white);
            overflow-y: auto;
        }

        .form-header {
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--neutral-900);
        }

        p.subtitle {
            font-size: 14px;
            color: var(--neutral-600);
        }

        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }

        .form-group {
            margin-bottom: 16px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--neutral-900);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.input-icon {
            position: absolute;
            left: 14px;
            color: var(--neutral-300);
            transition: color 0.2s;
        }

        .form-control {
            width: 100%;
            padding: 10px 16px 10px 42px;
            font-size: 14px;
            border: 1.5px solid var(--neutral-200);
            border-radius: 10px;
            transition: all 0.2s ease;
            outline: none;
            color: var(--neutral-900);
            background-color: #fafafa;
        }

        .form-control:focus {
            border-color: var(--primary-600);
            background-color: var(--white);
            box-shadow: 0 0 0 4px var(--primary-100);
        }

        .form-control:focus + i.input-icon {
            color: var(--primary-600);
        }
        
        select.form-control {
            appearance: none;
            padding-left: 16px; /* No icon for select currently */
            cursor: pointer;
        }
        
        .select-wrapper {
            position: relative;
        }
        
        .select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neutral-600);
            pointer-events: none;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            cursor: pointer;
            color: var(--neutral-300);
            transition: color 0.2s;
            z-index: 10;
        }

        .toggle-password:hover { color: var(--neutral-600); }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
            font-size: 13px;
            color: var(--neutral-600);
            line-height: 1.5;
        }

        .terms-checkbox input {
            margin-top: 3px;
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--primary-600);
            flex-shrink: 0;
        }
        
        .terms-checkbox a {
            color: var(--primary-600);
            text-decoration: none;
            font-weight: 500;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-600);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .btn-submit:hover {
            background-color: var(--primary-700);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 122, 140, 0.2);
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: var(--neutral-600);
        }

        .login-link a {
            color: var(--primary-600);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Responsive Adjustments */
        @media (max-width: 900px) {
            .branding-side { display: none; }
            .auth-wrapper { max-width: 500px; min-height: auto; }
            .form-side { width: 100%; padding: 40px; }
        }
        @media (max-width: 480px) {
            .form-side { padding: 32px 24px; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="branding-side">
            <img src="../../logo/caredee_v2.png" alt="CareDee Logo" class="brand-logo" />
            <h2>เริ่มต้นเส้นทาง<br>การดูแลกับ CareDee</h2>
            <p>ร่วมเป็นส่วนหนึ่งของเครือข่ายผู้ดูแลสุขภาพที่ได้รับความไว้วางใจที่สุด</p>
        </div>

        <div class="form-side">
            <div class="form-header">
                <h1>สร้างบัญชีใหม่</h1>
                <p class="subtitle">กรุณากรอกข้อมูลเพื่อลงทะเบียนเข้าใช้งานระบบ</p>
            </div>

            <form id="register-form" action="login_template.html">
                
                <div class="form-group">
                    <label>ประเภทบัญชีผู้ใช้ (สำหรับระบบ Portal)</label>
                    <div class="select-wrapper">
                        <select class="form-control" required>
                            <option value="" disabled selected>เลือกประเภทบัญชี...</option>
                            <option value="admin">ผู้ดูแลระบบ (Admin Portal)</option>
                            <option value="training">สถาบันฝึกอบรม (Training Institute)</option>
                            <option value="operator">เจ้าหน้าที่ศูนย์บริการ (Operator Portal)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstname">ชื่อ</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="firstname" class="form-control" placeholder="ชื่อ" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="lastname">นามสกุล</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="lastname" class="form-control" placeholder="นามสกุล" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">เบอร์โทรศัพท์</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="phone" class="form-control" placeholder="08X-XXX-XXXX" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">อีเมล</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" class="form-control" placeholder="อย่างน้อย 8 ตัวอักษร" required>
                        <i class="far fa-eye toggle-password" onclick="togglePass('password', this)"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">ยืนยันรหัสผ่าน</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="confirm-password" class="form-control" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
                        <i class="far fa-eye toggle-password" onclick="togglePass('confirm-password', this)"></i>
                    </div>
                </div>

                <label class="terms-checkbox">
                    <input type="checkbox" required>
                    <span>ฉันยอมรับ <a href="#">ข้อตกลงในการใช้งาน</a> และ <a href="#">นโยบายความเป็นส่วนตัว (PDPA)</a> ของ CareDee</span>
                </label>

                <button type="submit" class="btn-submit">ลงทะเบียน</button>
            </form>

            <div class="login-link">
                มีบัญชีอยู่แล้ว? <a href="login_template.html">เข้าสู่ระบบ</a>
            </div>
        </div>
    </div>

    <script>
        function togglePass(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>

        }
    </script>

</body>
</html>
