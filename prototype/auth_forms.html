<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareDee - Authentication (Prototype)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tab-group {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            font-weight: bold;
            color: var(--secondary-color);
        }
        .tab.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }
    </style>
</head>
<body class="mobile-layout">
    <div class="mobile-frame">
        <header class="app-header">
            <div class="logo"><strong>CareDee (แคร์ดี)</strong></div>
        </header>

        <main class="app-content">
            <div style="text-align: center; margin-bottom: 2rem; margin-top: 1rem;">
                <h1 style="margin: 0; font-size: 1.8rem;">ยินดีต้อนรับ</h1>
                <p>แพลตฟอร์มสำหรับผู้ดูแลและผู้สูงอายุ</p>
            </div>

            <div class="card">
                <div class="tab-group">
                    <div id="login-tab" class="tab active" onclick="showAuth('login')">เข้าสู่ระบบ</div>
                    <div id="register-tab" class="tab" onclick="showAuth('register')">ลงทะเบียน</div>
                </div>

                <!-- Login Form -->
                <div id="login-form">
                    <div class="form-group">
                        <label>เบอร์โทรศัพท์ / อีเมล</label>
                        <input type="text" placeholder="ระบุเบอร์หรืออีเมล">
                    </div>
                    <div class="form-group">
                        <label>รหัสผ่าน</label>
                        <input type="password" placeholder="••••••••">
                    </div>
                    <div style="text-align: right; margin-bottom: 1.5rem;">
                        <a href="#" style="font-size: 0.9rem; color: var(--primary-color);">ลืมรหัสผ่าน?</a>
                    </div>
                    <button class="btn-primary" style="width: 100%;" onclick="login()">เข้าสู่ระบบ</button>
                </div>

                <!-- Register Form -->
                <div id="register-form" style="display: none;">
                    <div class="form-group">
                        <label>ประเภทผู้ใช้งาน</label>
                        <select id="user-role" onchange="updateRegisterFields()">
                            <option value="customer">ลูกค้า (ครอบครัว)</option>
                            <option value="caregiver">ผู้ดูแล</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ชื่อ-นามสกุล</label>
                        <input type="text" placeholder="ชื่อจริง">
                    </div>
                    <div class="form-group">
                        <label>เบอร์โทรศัพท์</label>
                        <input type="text" placeholder="08X-XXX-XXXX">
                    </div>
                    <div class="form-group">
                        <label>รหัสผ่าน</label>
                        <input type="password" placeholder="อย่างน้อย 8 ตัวอักษร">
                    </div>

                    <!-- Caregiver Specific Fields -->
                    <div id="caregiver-fields" style="display: none; background: #f9f9f9; padding: 1rem; border-radius: 4px; margin-bottom: 1.5rem;">
                        <p><b>ข้อมูลเพิ่มเติม</b></p>
                        <div class="form-group">
                            <label>เลขใบประกอบวิชาชีพ</label>
                            <input type="text">
                        </div>
                        <label style="font-weight: normal;"><input type="checkbox"> ยินยอมตรวจสอบประวัติอาชญากรรม</label>
                    </div>

                    <div class="form-group" style="font-size: 0.8rem; color: var(--secondary-color);">
                        <label style="font-weight: normal;">
                            <input type="checkbox"> ฉันยอมรับนโยบาย PDPA
                        </label>
                    </div>
                    <button class="btn-success" style="width: 100%;" onclick="register()">สมัครสมาชิก</button>
                </div>
            </div>

            <div style="text-align: center; margin-top: 1rem; margin-bottom: 2rem;">
                <a href="customer_forms.html" style="color: var(--secondary-color); font-size: 0.9rem;">ข้ามไปหน้าสำรวจ (ผู้เยี่ยมชม)</a>
            </div>
        </main>
    </div>

    <script>
        function showAuth(type) {
            if (type === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
                document.getElementById('login-tab').classList.add('active');
                document.getElementById('register-tab').classList.remove('active');
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
                document.getElementById('login-tab').classList.remove('active');
                document.getElementById('register-tab').classList.add('active');
            }
        }

        function updateRegisterFields() {
            const role = document.getElementById('user-role').value;
            document.getElementById('caregiver-fields').style.display = (role === 'caregiver') ? 'block' : 'none';
        }

        function login() {
            alert('เข้าสู่ระบบสำเร็จ!');
            window.location.href = 'customer_forms.html';
        }

        function register() {
            alert('ลงทะเบียนสำเร็จ! กรุณายืนยันตัวตนด้วย OTP');
            showAuth('login');
        }
    </script>
</body>
</html>
